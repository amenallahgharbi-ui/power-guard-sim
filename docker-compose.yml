services:
  ingest-api:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - ./ingest/api/.env
    command: >
      sh -c "pip install --no-cache-dir -r ingest/api/requirements.txt
      && uvicorn ingest.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  preprocess:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - ./ingest/api/.env
    command: >
      sh -c "set -eux;
      python --version;
      ls -la;
      ls -la preprocess;
      pip install --no-cache-dir requests;
      python -u preprocess/job.py"

  alert-engine:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - ./ingest/api/.env
    environment:
      - ALERTS_SLEEP_SECONDS=60
      - ALERTS_LOOKBACK_MINUTES=43200
      - ALERTS_HYSTERESIS_N=3
      - ALERTS_EWMA_ALPHA=0.2
      - CALIB_J0=2026-02-01
      - CALIB_J7=2026-02-08
    command: >
      sh -c "cd alerts/engine
      && npm install --silent
      && npm run start"

