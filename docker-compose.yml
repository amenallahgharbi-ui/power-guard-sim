services:
  ingest-api:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - ./ingest/api/.env
    command: >
      sh -c "pip install --no-cache-dir -r ingest/api/requirements.txt
      && uvicorn ingest.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  preprocess:
    image: python:3.10-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - ./ingest/api/.env
    command: >
      sh -c "set -eux;
      python --version;
      ls -la;
      ls -la preprocess;
      pip install --no-cache-dir requests;
      python -u preprocess/job.py"
